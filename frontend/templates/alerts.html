{% extends "base.html" %}

{% block content %}

<div class="alert-container">

    <div class="alert-header">
        <h2>📢 Smart Stock Alerts</h2>
        <p>Set intelligent alerts and receive daily email reports.</p>
    </div>

    <div class="alert-card">

        <form method="POST" action="/set-alert">

            <div class="form-group">
                <label>Stock Symbol</label>
                <input type="text" name="symbol" placeholder="e.g. AAPL" required>
            </div>

            <div class="form-group">
                <label>Target Price ($)</label>
                <input type="number" step="0.01" name="price" placeholder="Enter target price" required>
            </div>

            <div class="form-group">
                <label>Alert Type</label>
                <select name="condition">
                    <option value="above">📈 Price Goes Above</option>
                    <option value="below">📉 Price Goes Below</option>
                </select>
            </div>

            <div class="form-group">
                <label>Email for Notification</label>
                <input type="email" name="email" placeholder="your@email.com" required>
            </div>

            <button type="submit" class="alert-btn">
                Set Alert
            </button>

        </form>

        {% if message %}
        <div class="success-message">
            {{ message }}
        </div>
        {% endif %}

    </div>

</div>

{% endblock %}
