{% extends "base.html" %}

{% block content %}

<div class="alert-wrapper">

    <!-- Header -->
    <div class="alert-header">
        <h2>📊 Stock Alert</h2>
        <p>Monitor market movements and receive intelligent email insights daily.</p>
    </div>

    <!-- Card -->
    <div class="alert-card">

        <form method="POST" action="/set-alert">

            <div class="grid">

                <div class="form-group">
                    <label>📌 Stock Symbol</label>
                    <input type="text" name="symbol" placeholder="AAPL, TSLA..." required>
                </div>

                <div class="form-group">
                    <label>💲 Target Price</label>
                    <input type="number" step="0.01" name="price" placeholder="e.g. 200" required>
                </div>

                <div class="form-group">
                    <label>📈 Alert Condition</label>
                    <select name="condition">
                        <option value="above">Above Target Price</option>
                        <option value="below">Below Target Price</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>📧 Email Address</label>
                    <input type="email" name="email" placeholder="your@email.com" required>
                </div>

            </div>

            <button type="submit" class="alert-btn">
                🚀 Activate Alert
            </button>

        </form>

        {% if message %}
        <div class="success-message">
            ✅ {{ message }}
        </div>
        {% endif %}

    </div>

</div>

{% endblock %}
